<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PŸUR Wechselberatung</title>

<style>

:root{
--pyur-blue:#243c8f;
--pyur-blue-2:#3157b7;
--pyur-cyan:#2bb9e8;
--pyur-green:#9ccf10;
--pyur-pink:#e61e5c;
--pyur-light:#f4f7fb;
--pyur-text:#20304d;
--good:#148546;
--bad:#c63a2f;
--neutral:#c97800;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
color:#fff;
background:linear-gradient(135deg,var(--pyur-blue) 0%,var(--pyur-blue-2) 55%,var(--pyur-cyan) 100%);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.hero{
background:rgba(255,255,255,0.1);
border-radius:20px;
padding:25px;
margin-bottom:20px;
}

.badge{
background:var(--pyur-pink);
padding:6px 14px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-bottom:10px;
}

h1{margin:0}

.top-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#fff;
color:var(--pyur-text);
border-radius:20px;
padding:20px;
}

.card h2{
margin-top:0;
color:var(--pyur-blue);
}

.field{
margin-bottom:15px;
}

.field label{
font-weight:700;
display:block;
margin-bottom:6px;
}

.field input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.btn-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.tarif-btn{
border:none;
border-radius:14px;
padding:16px;
background:#f4f7fb;
cursor:pointer;
border:2px solid #e1e8f2;
}

.tarif-btn.active{
background:linear-gradient(135deg,var(--pyur-blue),var(--pyur-blue-2));
color:#fff;
}

.tarif-btn .name{
font-weight:700;
display:block;
font-size:18px;
}

.tarif-btn .price{
font-weight:700;
font-size:20px;
margin-top:6px;
}

.result-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px;
margin-top:20px;
}

.result-box{
background:var(--pyur-light);
color:var(--pyur-text);
border-radius:15px;
padding:18px;
}

.result-title{
font-size:12px;
font-weight:700;
margin-bottom:6px;
}

.result-value{
font-size:24px;
font-weight:700;
}

.good{color:var(--good)}
.bad{color:var(--bad)}
.neutral{color:var(--neutral)}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<div class="badge">PŸUR Tarifvergleich</div>
<h1>Kostenvergleich</h1>
</div>

<div class="top-grid">

<div class="card">
<h2>Ist-Zustand</h2>

<div class="field">
<label>Anbieter</label>
<input id="anbieter" oninput="berechnen()">
</div>

<div class="field">
<label>Internetpreis (€)</label>
<input id="internetPreis" type="number" oninput="berechnen()">
</div>

<div class="field">
<label>Router (€)</label>
<input id="routerPreis" type="number" oninput="berechnen()">
</div>

<div class="field">
<label>Sonstige Kosten (€)</label>
<input id="sonstigePreis" type="number" oninput="berechnen()">
</div>

<div class="field">
<label>Geschwindigkeit</label>
<input id="altGeschwindigkeit" oninput="berechnen()">
</div>

</div>

<div class="card">
<h2>Tarif auswählen</h2>

<div class="btn-grid">

<button class="tarif-btn active" data-tarif="kombi500tv" onclick="selectTarif('kombi500tv')">
<span class="name">Kombi 500 PYUR TV Wechsler</span>
<span class="price">44,99 €</span>
</button>

<button class="tarif-btn" data-tarif="kombi1000tv" onclick="selectTarif('kombi1000tv')">
<span class="name">Kombi 1000 PYUR TV Wechsler</span>
<span class="price">49,99 €</span>
</button>

</div>

</div>

</div>

<div class="card">

<h2>Vergleich</h2>

<div class="result-grid">

<div class="result-box">
<div class="result-title">Aktuell</div>
<div class="result-value" id="aktuellGesamt">0 €</div>
</div>

<div class="result-box">
<div class="result-title">PYUR</div>
<div class="result-value" id="neuGesamt">0 €</div>
</div>

<div class="result-box">
<div class="result-title">Monat</div>
<div class="result-value neutral" id="differenzMonat">0 €</div>
</div>

<div class="result-box">
<div class="result-title">Jahr</div>
<div class="result-value neutral" id="differenzJahr">0 €</div>
</div>

<div class="result-box">
<div class="result-title">24 Monate</div>
<div class="result-value neutral" id="differenz24">0 €</div>
</div>

</div>

</div>

</div>

<script>

let selectedTarif="kombi500tv"

const tarife={
kombi500tv:{name:"Kombi 500 PYUR TV Wechsler",preis:44.99},
kombi1000tv:{name:"Kombi 1000 PYUR TV Wechsler",preis:49.99}
}

function euro(x){
return x.toLocaleString("de-DE",{style:"currency",currency:"EUR"})
}

function num(id){
let v=parseFloat(document.getElementById(id).value)
return isNaN(v)?0:v
}

function selectTarif(t){
selectedTarif=t

document.querySelectorAll(".tarif-btn").forEach(b=>{
b.classList.remove("active")
})

document.querySelector(`[data-tarif=${t}]`).classList.add("active")

berechnen()
}

function berechnen(){

let alt=
num("internetPreis")+
num("routerPreis")+
num("sonstigePreis")

let neu=tarife[selectedTarif].preis

let diff=alt-neu
let jahr=diff*12
let m24=diff*24

document.getElementById("aktuellGesamt").innerText=euro(alt)
document.getElementById("neuGesamt").innerText=euro(neu)

let m=document.getElementById("differenzMonat")
let j=document.getElementById("differenzJahr")
let z=document.getElementById("differenz24")

m.innerText=euro(diff)
j.innerText=euro(jahr)
z.innerText=euro(m24)

m.className="result-value "+(diff>0?"good":diff<0?"bad":"neutral")
j.className="result-value "+(jahr>0?"good":jahr<0?"bad":"neutral")
z.className="result-value "+(m24>0?"good":m24<0?"bad":"neutral")

}

berechnen()

</script>

</body>
</html>
